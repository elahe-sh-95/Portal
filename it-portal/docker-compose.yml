version: '3.8'

services:
  it-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-portal
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - intranet

networks:
  intranet:
    driver: bridge
